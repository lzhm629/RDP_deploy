project:
  name: wipedish_sensor_only
  output_dir: logs

runtime:
  duration_sec: 10
  snapshot_timeout_sec: 10
  expected_fps: 24
  sync_slop: 0.4
  obs_buffer_size: 1024

robot:
  backend: forcemimic_rizon
  robot_id: Rizon4s-063586
  tool_name: hapticexoteleop
  gripper_id: 1659f0e0dde0
  gripper_name: Xense
  gripper_block: false
  arm: left
  bimanual: false
  read_fps: 90

data_processing:
  mode: single_arm_one_wrist_camera
  image_resize_shape: [320, 240]
  use_6d_rotation: true
  debug: false

devices:
  robot:
    enabled: true
    fps: ${robot.read_fps}
  realsense:
    enabled: true
    cameras:
      - camera_serial_number: "260322274925"
        camera_name: left_wrist_camera
        rgb_resolution: [640, 480]
        fps: 30
        stream_fps: 30
        warmup_frames: 30

observation:
  history_size: 2
  temporal_downsample_ratio: 2
  required_keys:
    - left_wrist_img
    - left_robot_tcp_pose
    - left_robot_gripper_width
    - left_robot_tcp_wrench

collection:
  save_snapshot_pickle: true
  save_stream_numpy: true
  save_stream_pickle: true

model:
  # 可通过 validate_offline_control.py 的命令行参数覆盖。
  checkpoint_path: ../wipedish_7_17/LDP/checkpoints/epoch=0340-train_loss=0.085.ckpt
  at_checkpoint_path: ../wipedish_7_17/AT/checkpoints/latest.ckpt
  device: cuda:0
  use_ema: auto
  num_inference_steps: 8
  dataset_obs_temporal_downsample_ratio: 2
  decoder_horizon: 32
  max_normalized_lowdim_abs: 20.0
  seed: 42
  print_steps: 5

deployment:
  default_mode: shadow
  duration_sec: 10
  startup_timeout_sec: 15
  control_fps: 24
  inference_fps: 6
  robot_send_fps: 90
  tcp_action_update_interval: 16
  latency_step: 4
  observation_timeout_sec: 0.25
  target_timeout_sec: 0.25
  print_interval_sec: 1.0
  motion_confirmation: MOVE_RIZON4S_063586

safety:
  # 固定工作空间与相对启动位姿包络必须同时满足。
  workspace_min: [0.45, -0.50, 0.04]
  workspace_max: [0.85, 0.20, 0.60]
  max_start_offset: [0.08, 0.08, 0.05]
  max_force_norm: 30.0
  max_torque_norm: 5.0
  max_target_jump_m: 0.02
  max_target_jump_rad: 0.35
  max_tracking_error_m: 0.03
  max_tracking_error_rad: 0.50
  max_linear_velocity: 0.02
  max_angular_velocity: 0.05
